name: Release (App Store)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to submit (e.g. 1.4.0). Must match MARKETING_VERSION."
        required: true

env:
  SCHEME: GiveMeABreak
  PROJECT_DIR: GiveMeABreak
  APP_NAME: "Give Me A Break"
  APP_BUNDLE_ID: com.givemeabreak.app

jobs:
  build-and-upload:
    name: Build & Upload to App Store Connect
    runs-on: macos-26
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      - name: Install signing certificate
        env:
          CERTIFICATE_P12: ${{ secrets.APPSTORE_CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_CERTIFICATE_PASSWORD }}
          INSTALLER_CERTIFICATE_P12: ${{ secrets.APPSTORE_INSTALLER_CERTIFICATE_P12 }}
          INSTALLER_CERTIFICATE_PASSWORD: ${{ secrets.APPSTORE_INSTALLER_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$RUNNER_TEMP/certificate.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"

          echo "$CERTIFICATE_P12" | base64 --decode -o "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERT_PATH" \
            -P "$CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          if [ -n "$INSTALLER_CERTIFICATE_P12" ]; then
            INSTALLER_CERT_PATH="$RUNNER_TEMP/installer-certificate.p12"
            echo "$INSTALLER_CERTIFICATE_P12" | base64 --decode -o "$INSTALLER_CERT_PATH"
            security import "$INSTALLER_CERT_PATH" \
              -P "${INSTALLER_CERTIFICATE_PASSWORD:-$CERTIFICATE_PASSWORD}" \
              -A \
              -t cert \
              -f pkcs12 \
              -k "$KEYCHAIN_PATH"
          fi

          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security find-identity -v -p codesigning

      - name: Install provisioning profile
        env:
          APPSTORE_PROVISIONING_PROFILE_BASE64: ${{ secrets.APPSTORE_PROVISIONING_PROFILE_BASE64 }}
        run: |
          PROFILE_PATH="$RUNNER_TEMP/appstore.provisionprofile"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILE_DIR"

          echo "$APPSTORE_PROVISIONING_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"

          PROFILE_PLIST="$RUNNER_TEMP/profile.plist"
          security cms -D -i "$PROFILE_PATH" > "$PROFILE_PLIST"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"

          cp "$PROFILE_PATH" "$PROFILE_DIR/$PROFILE_UUID.provisionprofile"
          echo "APPSTORE_PROFILE_UUID=$PROFILE_UUID" >> "$GITHUB_ENV"
          echo "APPSTORE_PROFILE_NAME=$PROFILE_NAME" >> "$GITHUB_ENV"

      - name: Prepare ExportOptions plist
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # App Store installer cert for this team is currently issued as
          # "3rd Party Mac Developer Installer".
          INSTALLER_CERT_IDENTITY="3rd Party Mac Developer Installer"

          EXPORT_OPTIONS_PLIST="$RUNNER_TEMP/ExportOptions-AppStore.plist"
          cp "$PROJECT_DIR/ExportOptions-AppStore.plist" "$EXPORT_OPTIONS_PLIST"
          sed -i '' "s/__TEAM_ID__/$APPLE_TEAM_ID/g" "$EXPORT_OPTIONS_PLIST"
          sed -i '' "s/__BUNDLE_ID__/$APP_BUNDLE_ID/g" "$EXPORT_OPTIONS_PLIST"
          sed -i '' "s/__PROFILE_UUID__/$APPSTORE_PROFILE_UUID/g" "$EXPORT_OPTIONS_PLIST"
          sed -i '' "s/__INSTALLER_SIGNING_CERTIFICATE__/$INSTALLER_CERT_IDENTITY/g" "$EXPORT_OPTIONS_PLIST"
          echo "EXPORT_OPTIONS_PLIST=$EXPORT_OPTIONS_PLIST" >> "$GITHUB_ENV"

      - name: Build archive
        run: |
          xcodebuild archive \
            -project "$PROJECT_DIR/$SCHEME.xcodeproj" \
            -scheme "$SCHEME" \
            -configuration Release-AppStore \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            MARKETING_VERSION="${{ inputs.version }}" \
            -quiet

      - name: Export for App Store
        run: |
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/$SCHEME.xcarchive" \
            -exportPath "$RUNNER_TEMP/appstore" \
            -exportOptionsPlist "$EXPORT_OPTIONS_PLIST"

      - name: Upload to App Store Connect
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
          ASC_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          KEY_DIR="$HOME/.appstoreconnect/private_keys"
          KEY_PATH="$KEY_DIR/AuthKey_${ASC_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          echo "$ASC_API_KEY" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"

          ARTIFACT_PATH="$(ls "$RUNNER_TEMP"/appstore/*.pkg 2>/dev/null | head -n 1 || true)"
          if [ -z "$ARTIFACT_PATH" ]; then
            ARTIFACT_PATH="$(ls "$RUNNER_TEMP"/appstore/*.ipa 2>/dev/null | head -n 1 || true)"
          fi
          if [ -z "$ARTIFACT_PATH" ]; then
            echo "No upload artifact found in $RUNNER_TEMP/appstore"
            ls -la "$RUNNER_TEMP/appstore"
            exit 1
          fi

          xcrun altool --upload-app \
            -f "$ARTIFACT_PATH" \
            --type macos \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_API_ISSUER_ID" \
            --show-progress

      - name: Clean up keychain
        if: always()
        run: security delete-keychain "$RUNNER_TEMP/build.keychain-db" 2>/dev/null || true
